name: 量子视界 · 每日自动

on:
  schedule:
    - cron: '0 1 * * *'     # 北京时间 9:00
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: 生成日报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/auto_daily.js

      - name: 复制到根目录
        run: cp output/index.html index.html

      - name: 提交
        run: |
          git config user.name "量子视界"
          git config user.email "bot@quantum-daily.dev"
          git add output/ index.html || true
          if git diff --cached --quiet; then
            echo "无变更"
          else
            TODAY=$(date +%Y-%m-%d)
            TOT=$(node -e "try{console.log(require('./output/summary.json').total)}catch(e){console.log('?')}")
            git commit -m "📰 ${TODAY} · ${TOT}条"
            git push
            echo "✅ 已推送"
          fi
