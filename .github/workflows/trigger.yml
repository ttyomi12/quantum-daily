name: 手动运行日报

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: 生成日报
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node scripts/run4.js
      - name: 提交日报
        run: |
          git config user.name "量子日报机器人"
          git config user.email "bot@quantumctek.com"
          git add output/ || true
          if git diff --cached --quiet 2>/dev/null; then echo "无变更"; else
            TODAY=$(date +%Y-%m-%d)
            TOT=$(cat output/summary.json 2>/dev/null | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('total','?'))" 2>/dev/null || echo "?")
            git commit -m "📰 ${TODAY} · ${TOT}条快讯"
            git push
          fi
      - name: 推送到Gitee
        run: |
          git remote add gitee https://TRamses:${{ secrets.GITEE_TOKEN }}@gitee.com/TRamses/quantum-daily.git 2>/dev/null || true
          git push gitee main --force
          echo "✅ Gitee已同步"
      - name: 触发Pages更新
        run: |
          curl -s -X POST "https://gitee.com/api/v5/repos/TRamses/quantum-daily/pages/builds" -H "Content-Type: application/json" -d "{\"access_token\":\"${{ secrets.GITEE_TOKEN }}\"}"
          echo ""
          echo "🌐 https://TRamses.gitee.io/quantum-daily/"
